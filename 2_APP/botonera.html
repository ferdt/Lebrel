<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Botonera</title>
    <link rel="stylesheet" href="css/style.css?v=3">
    <style>
        .botonera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px;
            flex: 1;
        }
        .btn-large {
            height: 100%;
            min-height: 120px;
            font-size: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .btn-large:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-large.plus { border-color: var(--accent-green); color: var(--accent-green); background: rgba(34, 197, 94, 0.05); }
        .btn-large.minus { border-color: var(--accent-red); color: var(--accent-red); background: rgba(239, 68, 68, 0.05); }
        .btn-large.action { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(59, 130, 246, 0.05); }
        
        .btn-subtext {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .dist-display {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 5px;
        }
        .dist-val {
            font-size: 2.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="glass-container">
        <header class="unified-header">
            <nav class="main-nav">
                <a href="#" onclick="window.navigateSPA('piloto.html'); return false;" class="nav-link">Piloto</a>
                <a href="#" onclick="window.navigateSPA('copiloto.html'); return false;" class="nav-link">Copiloto</a>
                <a href="#" onclick="window.navigateSPA('botonera.html'); return false;" class="nav-link active">Botonera</a>
                <a href="#" onclick="window.navigateSPA('config.html'); return false;" class="nav-link">Config</a>
                <a href="#" onclick="window.navigateSPA('tramos.html'); return false;" class="nav-link">Tramos</a>
                <a href="#" onclick="window.navigateSPA('test.html'); return false;" class="nav-link">Test</a>
            </nav>
            <div class="stage-info">
                <span id="val_tramo_nombre">--:--</span>
                <span class="separator">|</span>
                <span id="val_hora">00:00:00</span>
            </div>
            <div class="header-right" style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-rotate" class="icon-btn" title="Girar Pantalla">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
                <button id="btn-fullscreen" class="icon-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                </button>
                <div id="status-indicator" class="status disconnected">OFFLINE</div>
            </div>
        </header>

        <main class="botonera-grid">
            <div class="dist-display">
                <div id="val_distancia" class="dist-val">0.000 km</div>
                <div class="btn-subtext">Distancia Acumulada</div>
            </div>

            <button class="btn-large plus" onclick="adjustDist(10)">
                <span>+10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-10)">
                <span>-10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>

            <button class="btn-large plus" onclick="adjustDist(1)">
                <span>+1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-1)">
                <span>-1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>

            <button class="btn-large action" id="btn-milestone">
                <span>HITOS</span>
                <span class="btn-subtext">Ref. Externas</span>
            </button>
            <button class="btn-large action" id="btn-ocr">
                <span>OCR</span>
                <span class="btn-subtext">Lectura Cámara</span>
            </button>
        </main>
    </div>

    <script type="module" src="js/app_botonera.js?v=3"></script>
</body>
</html>
