<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Botonera</title>
    <link rel="stylesheet" href="css/style.css?v=17">
    <style>
        .botonera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px;
            flex: 1;
        }
        .btn-large {
            height: 100%;
            min-height: 120px;
            font-size: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .btn-large:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-large.plus { border-color: var(--accent-green); color: var(--accent-green); background: rgba(34, 197, 94, 0.05); }
        .btn-large.minus { border-color: var(--accent-red); color: var(--accent-red); background: rgba(239, 68, 68, 0.05); }
        .btn-large.action { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(59, 130, 246, 0.05); }
        
        .btn-subtext {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .dist-display {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 5px;
        }
        .dist-val {
            font-size: 2.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="glass-container">
        <div id="header-container"></div>

        <main class="botonera-grid">
            <div class="dist-display">
                <div id="val_distancia" class="dist-val">0.000 km</div>
                <div class="btn-subtext">Distancia Acumulada</div>
            </div>

            <button class="btn-large plus" onclick="adjustDist(10)">
                <span>+10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-10)">
                <span>-10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>

            <button class="btn-large plus" onclick="adjustDist(1)">
                <span>+1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-1)">
                <span>-1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>

            <button class="btn-large action" id="btn-milestone">
                <span>HITOS</span>
                <span class="btn-subtext">Ref. Externas</span>
            </button>
            <button class="btn-large action" id="btn-ocr">
                <span>OCR</span>
                <span class="btn-subtext">Lectura Cámara</span>
            </button>
        </main>
    </div>

    <script type="module" src="js/app_botonera.js?v=17"></script>
</body>
</html>
