<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Botonera</title>
    <link rel="stylesheet" href="css/style.css?v=24">
    <style>
        .glass-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 8px 12px;
            box-sizing: border-box;
        }

        .botonera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto repeat(3, 1fr);
            gap: 12px;
            padding: 5px 0;
            flex: 1;
            height: calc(100vh - 75px);
            box-sizing: border-box;
        }

        .dist-display {
            grid-column: 1 / -1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .dist-val {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: clamp(2rem, 6vmin, 3.5rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .btn-large {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .btn-large span:first-child {
            font-size: clamp(1.8rem, 6vmin, 4.5rem);
            font-weight: 900;
            letter-spacing: 1px;
        }

        .btn-large:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-large.plus {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: rgba(34, 197, 94, 0.05);
        }

        .btn-large.minus {
            border-color: var(--accent-red);
            color: var(--accent-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .btn-large.action {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .btn-subtext {
            font-size: clamp(0.7rem, 2vmin, 1.2rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <div id="header-container"></div>

        <main class="botonera-grid">
            <div class="dist-display">
                <div id="val_distancia" class="dist-val">0.000 km</div>
                <div class="btn-subtext">Distancia Acumulada</div>
            </div>

            <button class="btn-large plus" onclick="adjustDist(10)">
                <span>+10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-10)">
                <span>-10 m</span>
                <span class="btn-subtext">Ajuste Fino</span>
            </button>

            <button class="btn-large plus" onclick="adjustDist(1)">
                <span>+1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>
            <button class="btn-large minus" onclick="adjustDist(-1)">
                <span>-1 m</span>
                <span class="btn-subtext">Precisión</span>
            </button>

            <button class="btn-large action" id="btn-milestone">
                <span>HITOS</span>
                <span class="btn-subtext">Ref. Externas</span>
            </button>
            <button class="btn-large action" id="btn-ocr">
                <span>TABLAS</span>
                <span class="btn-subtext">Lectura Cámara</span>
            </button>

            <button class="btn-large action" id="btn-ref-ext-action" style="grid-column: 1 / -1; background: rgba(251, 191, 36, 0.2); border-color: #f59e0b; color: #f59e0b; min-height: 70px;">
                <span>REF. EXTERNAS</span>
                <span class="btn-subtext" style="color: rgba(255, 255, 255, 0.85)">Actualizar tramo</span>
            </button>
        </main>
    </div>

    <script type="module" src="js/app_botonera.js?v=24"></script>
</body>

</html>
