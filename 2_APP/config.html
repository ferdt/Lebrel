<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebrel - Configuración</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 1rem;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="glass-container">
        <header class="unified-header">
            <nav class="main-nav">
                <a href="#" onclick="window.navigateSPA('piloto.html'); return false;" class="nav-link">Piloto</a>
                <a href="#" onclick="window.navigateSPA('copiloto.html'); return false;" class="nav-link">Copiloto</a>
                <a href="#" onclick="window.navigateSPA('botonera.html'); return false;" class="nav-link">Botonera</a>
                <a href="#" onclick="window.navigateSPA('config.html'); return false;" class="nav-link active">Config</a>
                <a href="#" onclick="window.navigateSPA('tramos.html'); return false;" class="nav-link">Tramos</a>
                <a href="#" onclick="window.navigateSPA('test.html'); return false;" class="nav-link">Test</a>
            </nav>
            <div class="stage-info">
                <span id="val_tramo_nombre">Configuración</span>
                <span class="separator">|</span>
                <span id="val_hora">00:00:00</span>
            </div>
            <div class="header-right" style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-rotate" class="icon-btn" title="Girar Pantalla">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
                <button id="btn-fullscreen" class="icon-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
                <div id="status-indicator" class="status connected">Ajustes</div>
            </div>
        </header>

        <main class="dashboard">
            <div class="card metric" style="align-items: flex-start; width: 100%;">
                <h3 style="width:100%;">Hardware y Cálculo</h3>
                
                <div class="form-group" style="width:100%;">
                    <label for="odometer_source">Fuente del Odómetro</label>
                    <select id="odometer_source">
                        <option value="test">Simulador (Test Control)</option>
                        <option value="wheel">Ruedas (Sensor Hardware)</option>
                        <option value="gps">GPS</option>
                    </select>
                </div>

                <div class="form-group" style="width:100%;">
                    <label for="wheel_perimeter_m">Perímetro Rueda (m)</label>
                    <input type="number" step="0.001" id="wheel_perimeter_m" value="1.950">
                </div>

                <div class="form-group" style="width:100%;">
                    <label for="neutral_interval_s">Margen de Tiempo Neutro (s)</label>
                    <input type="number" step="0.01" id="neutral_interval_s" value="0.10">
                </div>

                <h3 style="width:100%; margin-top:20px;">Apariencia</h3>
                <div class="form-group" style="width:100%;">
                    <label for="theme">Tema</label>
                    <select id="theme">
                        <option value="dark">Oscuro (Glassmorphism)</option>
                        <option value="light">Claro</option>
                    </select>
                </div>
                
                <div class="form-group" style="width:100%;">
                    <label for="font_size_offset">Ajuste de Tamaño de Fuente (px)</label>
                    <input type="number" id="font_size_offset" value="0">
                </div>

                <div class="controls mt-2" style="width:100%; display: flex; justify-content:flex-end;">
                    <button id="btn-save" class="positive" style="background: rgba(34, 197, 94, 0.2); border-color: var(--accent-green); color: var(--accent-green);">Guardar Cambios</button>
                </div>
                <div id="save-msg" style="color: var(--accent-green); margin-top: 10px; display: none;">Guardado correctamente.</div>
            </div>
        </main>
    </div>

    <script type="module" src="js/config.js?v=2"></script>
</body>
</html>
