<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Copiloto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css?v=3">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            height: 100%;
        }

        /* Lado izquierdo compacto */
        .compact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .compact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .compact-card h4 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .compact-card .value {
            font-size: clamp(1.2rem, 5vmin, 1.8rem);
        }

        /* Panel de OPeraciones abajo a la izq */
        .operations-panel {
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .operations-panel {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <header class="unified-header">
            <nav class="main-nav">
                <a href="#" onclick="window.navigateSPA('piloto.html'); return false;" class="nav-link">Piloto</a>
                <a href="#" onclick="window.navigateSPA('copiloto.html'); return false;" class="nav-link active">Copiloto</a>
                <a href="#" onclick="window.navigateSPA('botonera.html'); return false;" class="nav-link">Botonera</a>
                <a href="#" onclick="window.navigateSPA('config.html'); return false;" class="nav-link">Config</a>
                <a href="#" onclick="window.navigateSPA('tramos.html'); return false;" class="nav-link">Tramos</a>
                <a href="#" onclick="window.navigateSPA('test.html'); return false;" class="nav-link">Test</a>
            </nav>
            <div class="stage-info">
                <span id="val_tramo_nombre">TC-0: SIN TRAMO</span>
                <span class="separator">|</span>
                <span id="val_hora">00:00:00</span>
            </div>
            <div class="header-right" style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-rotate" class="icon-btn" title="Girar Pantalla">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
                <button id="btn-fullscreen" class="icon-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
                <div id="status-indicator" class="status disconnected">OFFLINE</div>
            </div>
        </header>

        <main class="split-layout">
            <!-- PANEL IZQUIERDO: Dashboard reducido y controles -->
            <section class="compact-info">

                <div class="compact-card">
                    <h4>Tiempo</h4>
                    <div id="val_tiempo_tramo" class="value">00:00:00</div>
                </div>

                <div class="compact-card"
                    style="border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);">
                    <h4 style="color: var(--accent-blue);">Odómetro</h4>
                    <div id="val_distancia" class="value"
                        style="font-size: clamp(2rem, 8vmin, 3rem); color: var(--accent-blue); font-weight: 800;">0.00
                        km</div>
                </div>

                <div class="compact-card">
                    <h4>Intervalo</h4>
                    <div id="val_diferencia_ideal" class="value positive">+0.0</div>
                </div>

                <div class="compact-card">
                    <h4>Velocidad (Act/Obj)</h4>
                    <div class="value"><span id="val_velocidad_actual">0.0</span> / <span id="val_velocidad_objetivo"
                            style="color:var(--text-secondary); font-size:clamp(0.9rem, 4vmin, 1.2rem);">0.0</span>
                    </div>
                </div>

                <!-- Botonera Integrada -->
                <div class="botonera-mini-grid">
                    <button class="btn-mini plus" id="btn-odo-plus">
                        <span>+10m</span>
                    </button>
                    <button class="btn-mini minus" id="btn-odo-minus">
                        <span>-10m</span>
                    </button>
                    <button class="btn-mini plus" id="btn-odo-plus1">
                        <span>+1m</span>
                    </button>
                    <button class="btn-mini minus" id="btn-odo-minus1">
                        <span>-1m</span>
                    </button>
                    <button class="btn-mini action" id="btn-milestone">
                        <span>HITOS</span>
                    </button>
                    <button class="btn-mini action" id="btn-ocr">
                        <span>OCR</span>
                    </button>
                </div>

                <div class="operations-panel">
                    <button id="btn-odo-reset" class="danger" style="width:100%; padding:8px; margin-bottom:10px; font-size:0.8rem;">RESET ODO</button>
                    <div class="btn-group-vertical">
                        <button id="btn-calibrar" style="padding:10px;">Calibración</button>
                        <button id="btn-tramos" style="padding:10px;">Tramos</button>
                    </div>
                </div>
            </section>

            <!-- PANEL DERECHO: Tabla del tramo -->
            <section>
                <div class="card" style="align-items:flex-start; padding:0; overflow:hidden; height:100%;">
                    <div style="width:100%; overflow-y:auto; flex:1;">
                        <table class="tramo-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>De (km)</th>
                                    <th>A (km)</th>
                                    <th>Media</th>
                                    <th>Duración</th>
                                    <th>T. Fin</th>
                                </tr>
                            </thead>
                            <tbody id="tabla_cuerpo">
                                <!-- Filas dinámicas generadas desde app_copiloto.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- Modal de Recalibración -->
        <div class="modal-overlay" id="modal-recalibrar">
            <div class="modal-box">
                <h3>Ajuste Roadbook</h3>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px;">
                    Captura: <span id="snap-dist-val" style="color: var(--accent-blue); font-weight: bold; font-size: 1.2rem;">0.000</span> km
                </p>
                
                <div class="form-group">
                    <input id="input-roadbook" type="number" step="0.001" placeholder="0.000" inputmode="decimal" 
                           style="font-size: 2.5rem; text-align: center; font-weight: 800; height: 80px;">
                </div>

                <!-- Botones de ajuste rápido dentro del modal -->
                <div class="modal-quick-adjust">
                    <button class="btn-quick plus" onclick="adjustModalVal(0.010)">+10m</button>
                    <button class="btn-quick plus" onclick="adjustModalVal(0.001)">+1m</button>
                    <button class="btn-quick minus" onclick="adjustModalVal(-0.001)">-1m</button>
                    <button class="btn-quick minus" onclick="adjustModalVal(-0.010)">-10m</button>
                    <button class="btn-quick zero" onclick="adjustModalVal('zero')" style="grid-column: span 4; margin-top: 5px;">Poner a Cero</button>
                </div>

                <div class="modal-actions" style="margin-top: 20px;">
                    <button class="btn-modal-cancel" id="btn-recal-cancel" style="flex:1; padding: 15px;">CANCELAR</button>
                    <button class="btn-modal-ok" id="btn-recal-ok" style="flex:2; padding: 15px; font-size: 1.2rem;">APLICAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barra de edición rápida de celdas (oculta por defecto) -->
    <div id="cell-edit-bar" class="cell-edit-bar">
        <div class="edit-inner">
            <span id="cell-edit-label">Editar:</span>
            <input type="text" id="cell-edit-input" inputmode="decimal">
            <div class="edit-actions">
                <button id="cell-edit-cancel" class="btn-cancel">✕</button>
                <button id="cell-edit-ok" class="btn-ok">✓ GUARDAR</button>
            </div>
        </div>
    </div>

    <!-- Cargar JS como module -->
    <script type="module" src="js/app_copiloto.js?v=4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Fail:', err));
            });
        }
    </script>
</body>

</html>
