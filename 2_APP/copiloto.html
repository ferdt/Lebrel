<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Copiloto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            height: 100%;
        }

        /* Lado izquierdo compacto */
        .compact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .compact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .compact-card h4 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .compact-card .value {
            font-size: clamp(1.2rem, 5vmin, 1.8rem);
        }

        /* Panel de OPeraciones abajo a la izq */
        .operations-panel {
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .operations-panel {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <header class="unified-header">
            <nav class="main-nav">
                <a href="#" onclick="window.navigateSPA('piloto.html'); return false;" class="nav-link">Piloto</a>
                <a href="#" onclick="window.navigateSPA('copiloto.html'); return false;"
                    class="nav-link active">Copiloto</a>
                <a href="#" onclick="window.navigateSPA('config.html'); return false;" class="nav-link">Config</a>
                <a href="#" onclick="window.navigateSPA('tramos.html'); return false;" class="nav-link">Tramos</a>
            </nav>
            <div class="stage-info">
                <span id="val_tramo_nombre">TC-0: SIN TRAMO</span>
                <span class="separator">|</span>
                <span id="val_hora">00:00:00</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-fullscreen" class="icon-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
                <div id="status-indicator" class="status disconnected">Desconectado</div>
            </div>
        </header>

        <main class="split-layout">
            <!-- PANEL IZQUIERDO: Dashboard reducido y controles -->
            <section class="compact-info">

                <div class="compact-card">
                    <h4>Tiempo</h4>
                    <div id="val_tiempo_tramo" class="value">00:00:00</div>
                </div>

                <div class="compact-card"
                    style="border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.1);">
                    <h4 style="color: var(--accent-blue);">Odómetro</h4>
                    <div id="val_distancia" class="value"
                        style="font-size: clamp(2rem, 8vmin, 3rem); color: var(--accent-blue); font-weight: 800;">0.00
                        km</div>
                </div>

                <div class="compact-card">
                    <h4>Intervalo</h4>
                    <div id="val_diferencia_ideal" class="value positive">+0.0</div>
                </div>

                <div class="compact-card">
                    <h4>Velocidad (Act/Obj)</h4>
                    <div class="value"><span id="val_velocidad_actual">0.0</span> / <span id="val_velocidad_objetivo"
                            style="color:var(--text-secondary); font-size:clamp(0.9rem, 4vmin, 1.2rem);">0.0</span>
                    </div>
                </div>

                <!-- Botones rápidos de Odómetro -->
                <div class="controls mt-2" style="justify-content:center;">
                    <button id="btn-odo-plus">+10m</button>
                    <button id="btn-odo-minus">-10m</button>
                    <button id="btn-odo-reset" class="danger">RST</button>
                </div>

                <div class="operations-panel">
                    <div class="btn-group-vertical">
                        <button id="btn-calibrar" style="padding:10px;">Calibración</button>
                        <button id="btn-tramos" style="padding:10px;">Tramos</button>
                    </div>
                </div>
            </section>

            <!-- PANEL DERECHO: Tabla del tramo -->
            <section>
                <div class="card" style="align-items:flex-start; padding:0; overflow:hidden; height:100%;">
                    <h3
                        style="padding: 20px 20px 10px 20px; margin:0; border-bottom:1px dashed var(--glass-border); width:100%;">
                        Tabla de medias</h3>

                    <div style="width:100%; overflow-y:auto; flex:1;">
                        <table class="tramo-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>De (km)</th>
                                    <th>A (km)</th>
                                    <th>Media</th>
                                    <th>Duración</th>
                                    <th>H. Fin</th>
                                </tr>
                            </thead>
                            <tbody id="tabla_cuerpo">
                                <!-- Filas dinámicas generadas desde app_copiloto.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Cargar JS como module -->
    <script type="module" src="js/app_copiloto.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Fail:', err));
            });
        }
    </script>
</body>

</html>
