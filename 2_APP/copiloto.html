<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Copiloto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css?v=24">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            height: 100%;
        }

        /* Lado izquierdo compacto */
        .compact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .compact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .compact-card h4 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .compact-card .value {
            font-size: clamp(1.2rem, 5vmin, 1.8rem);
        }

        /* Panel de OPeraciones abajo a la izq */
        .operations-panel {
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .split-layout {
                grid-template-columns: 1fr;
                height: auto;
            }

            .operations-panel {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <div id="header-container"></div>

        <main class="split-layout">
            <!-- PANEL IZQUIERDO: Dashboard reducido y controles -->
            <section class="compact-info">

                <div class="compact-card">
                    <h4>Tiempo</h4>
                    <div id="val_tiempo_tramo" class="value">00:00:00</div>
                </div>

                <div class="compact-card"
                    style="border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.15);">
                    <h4>Odómetro</h4>
                    <div class="value"
                        style="font-size: clamp(2rem, 8vmin, 3rem); color: #facc15; font-weight: 800; display: flex; align-items: baseline; gap: 6px;">
                        <span id="val_distancia">0.000</span>
                        <span style="font-weight: 400; font-size: 0.5em; opacity: 0.8;">km</span>
                    </div>
                </div>

                <div class="compact-card">
                    <h4>Intervalo</h4>
                    <div id="val_diferencia_ideal" class="value positive">+0.0</div>
                </div>

                <div class="compact-card">
                    <h4>Velocidad (Act/Obj)</h4>
                    <div class="value"><span id="val_velocidad_actual"
                            style="font-size: clamp(1.5rem, 8vmin, 2rem);">0.0</span> / <span
                            id="val_velocidad_objetivo"
                            style="color:var(--text-secondary); font-size: clamp(1.5rem, 8vmin, 2rem);">0.0</span>
                    </div>
                </div>

                <!-- Botonera Integrada -->
                <div class="botonera-mini-grid">
                    <button class="btn-mini plus" id="btn-odo-plus">
                        <span>+10 m</span>
                    </button>
                    <button class="btn-mini minus" id="btn-odo-minus">
                        <span>-10 m</span>
                    </button>
                    <button class="btn-mini plus" id="btn-odo-plus1">
                        <span>+1 m</span>
                    </button>
                    <button class="btn-mini minus" id="btn-odo-minus1">
                        <span>-1 m</span>
                    </button>
                    <button class="btn-mini action" id="btn-milestone">
                        <span>HITOS</span>
                    </button>
                    <button class="btn-mini action" id="btn-ocr">
                        <span>TABLAS</span>
                    </button>
                    <button class="btn-mini action" id="btn-ref-ext-action" style="grid-column: 1 / -1; background: rgba(251, 191, 36, 0.2); border-color: #f59e0b; color: #f59e0b; min-height: 50px;">
                        <span>REF. EXTERNAS</span>
                    </button>
                </div>

                <div class="operations-panel">
                    <button id="btn-odo-reset" class="danger"
                        style="width:100%; padding:8px; margin-bottom:10px; font-size:0.8rem;">RESET ODO</button>
                    <div class="btn-group-vertical">
                        <button id="btn-calibrar" style="padding:10px;">Calibración</button>
                        <button id="btn-tramos" style="padding:10px;"
                            onclick="window.navigateSPA('tramos.html')">Tramos</button>
                    </div>
                </div>
            </section>

            <!-- PANEL DERECHO: Tabla del tramo -->
            <section>
                <div class="card" style="align-items:flex-start; padding:0; overflow:hidden; height:100%;">
                    <div style="width:100%; overflow-y:auto; flex:1;">
                        <table class="tramo-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>De (km)</th>
                                    <th>A (km)</th>
                                    <th>Media</th>
                                    <th>Ext.</th>
                                    <th>Duración</th>
                                    <th>T. Fin</th>
                                </tr>
                            </thead>
                            <tbody id="tabla_cuerpo">
                                <!-- Filas dinámicas generadas desde app_copiloto.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>

        <!-- Ajuste de Odómetro (Recalibración) como BARRA INFERIOR -->
        <!-- Ajuste de Odómetro (Recalibración) como BARRA INFERIOR -->
        <div id="modal-recalibrar" class="cell-edit-bar">
            <div class="edit-container-full">
                <!-- 1. IZQUIERDA: Ajuste e Info -->
                <div class="edit-left">
                    <span id="recal-label">Ajuste Roadbook</span>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin:0;">
                        Captura: <span id="snap-dist-val"
                            style="color: var(--accent-blue); font-weight: 800;">0.000</span> km
                    </p>
                    <input type="text" id="input-roadbook" class="edit-input-large" readonly>
                    <div class="edit-actions-main">
                        <button id="btn-recal-cancel" class="btn-cancel">CANCELAR</button>
                        <button id="btn-recal-ok" class="btn-ok">APLICAR</button>
                    </div>
                </div>

                <!-- 2. DERECHA: Teclado Numérico -->
                <div class="edit-keypad">
                    <button class="btn-key" onclick="pressKeyOdo('7')">7</button>
                    <button class="btn-key" onclick="pressKeyOdo('8')">8</button>
                    <button class="btn-key" onclick="pressKeyOdo('9')">9</button>
                    <button class="btn-key action" onclick="pressKeyOdo('back')">⌫</button>

                    <button class="btn-key" onclick="pressKeyOdo('4')">4</button>
                    <button class="btn-key" onclick="pressKeyOdo('5')">5</button>
                    <button class="btn-key" onclick="pressKeyOdo('6')">6</button>
                    <button class="btn-key special" onclick="adjustOdoVal('zero')">C</button>

                    <button class="btn-key" onclick="pressKeyOdo('1')">1</button>
                    <button class="btn-key" onclick="pressKeyOdo('2')">2</button>
                    <button class="btn-key" onclick="pressKeyOdo('3')">3</button>
                    <button class="btn-key special" onclick="pressKeyOdo('.')">.</button>

                    <button class="btn-key zero-wide" onclick="pressKeyOdo('0')" style="grid-column: span 4;">0</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barra de edición rápida con TECLADO NUMÉRICO integrado -->
    <div id="cell-edit-bar" class="cell-edit-bar">
        <div class="edit-container-full">
            <!-- Izquierda: Info y Input -->
            <div class="edit-left">
                <span id="cell-edit-label">Editar:</span>
                <input type="text" id="cell-edit-input" class="edit-input-large" readonly>
                <div class="edit-actions-main">
                    <button id="cell-edit-cancel" class="btn-cancel">CANCELAR</button>
                    <button id="cell-edit-ok" class="btn-ok">✓ GUARDAR</button>
                </div>
            </div>

            <!-- Derecha: Teclado Numérico -->
            <div class="edit-keypad">
                <button class="btn-key" onclick="pressKey('7')">7</button>
                <button class="btn-key" onclick="pressKey('8')">8</button>
                <button class="btn-key" onclick="pressKey('9')">9</button>
                <button class="btn-key action" onclick="pressKey('back')">⌫</button>

                <button class="btn-key" onclick="pressKey('4')">4</button>
                <button class="btn-key" onclick="pressKey('5')">5</button>
                <button class="btn-key" onclick="pressKey('6')">6</button>
                <button class="btn-key special" onclick="pressKey(':')">:</button>

                <button class="btn-key" onclick="pressKey('1')">1</button>
                <button class="btn-key" onclick="pressKey('2')">2</button>
                <button class="btn-key" onclick="pressKey('3')">3</button>
                <button class="btn-key special" onclick="pressKey('.')">.</button>

                <button class="btn-key zero-wide" onclick="pressKey('0')" style="grid-column: span 4;">0</button>
            </div>
        </div>
    </div>

    <!-- Cargar JS como module -->
    <script type="module" src="js/app_copiloto.js?v=24"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=24').catch(err => console.log('SW Fail:', err));
            });
        }
    </script>
</body>

</html>
