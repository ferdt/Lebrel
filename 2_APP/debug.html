<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebrel - Debug</title>
    <link rel="stylesheet" href="css/style.css?v=24">
    <style>
        .debug-container {
            padding: 20px;
        }

        .debug-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            overflow: hidden;
        }

        .debug-table th,
        .debug-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .debug-table th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .debug-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .var-name {
            font-family: monospace;
            color: var(--accent-blue);
            font-weight: bold;
        }

        .var-value {
            font-family: monospace;
            color: var(--text-primary);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .log-status {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <div id="header-container"></div>

        <main class="debug-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Variables de Telemetría (Debug)</h2>
                <div id="status-indicator" class="status-dot disconnected"></div>
            </div>

            <table class="debug-table">
                <thead>
                    <tr>
                        <th>Variable</th>
                        <th>Valor</th>
                    </tr>
                </thead>
                <tbody id="debug-body">
                    <!-- Dinámico -->
                </tbody>
            </table>

            <div class="actions">
                <button id="btn-start-log" style="background: var(--accent-blue);">INICIAR LOG</button>
                <button id="btn-stop-log" style="background: var(--accent-red); display: none;">PARAR Y EXPORTAR</button>
            </div>
            <div id="log-info" class="log-status">Logging inactivo.</div>

            <div style="margin-top: 30px;">
                <h2 style="color: var(--accent-blue);">Estadísticas de la Raspberry Pi</h2>
                <table class="debug-table">
                    <thead>
                        <tr>
                            <th>Parámetro</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody id="sys-stats-body">
                        <tr>
                            <td class="var-name">Carga CPU (1m)</td>
                            <td class="var-value" id="stat-cpu-1m">-</td>
                        </tr>
                        <tr>
                            <td class="var-name">Temperatura CPU</td>
                            <td class="var-value" id="stat-cpu-temp">-</td>
                        </tr>
                        <tr>
                            <td class="var-name">Memoria RAM Usada</td>
                            <td class="var-value" id="stat-ram">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="margin-top: 20px; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px;">
                <h3 style="color: var(--accent-blue); margin: 0 0 12px 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Historial de Rendimiento</h3>
                <div style="display: flex; gap: 15px; margin-bottom: 12px; font-size: 0.8rem;">
                    <span style="color: #38bdf8; display: flex; align-items: center; gap: 5px;">
                        <span style="display:inline-block; width:12px; height:3px; background:#38bdf8; border-radius:2px;"></span> Carga CPU (%)
                    </span>
                    <span style="color: #ef4444; display: flex; align-items: center; gap: 5px;">
                        <span style="display:inline-block; width:12px; height:3px; background:#ef4444; border-radius:2px;"></span> Temp. CPU (°C)
                    </span>
                    <span style="color: #10b981; display: flex; align-items: center; gap: 5px;">
                        <span style="display:inline-block; width:12px; height:3px; background:#10b981; border-radius:2px;"></span> RAM Usada (%)
                    </span>
                </div>
                <canvas id="system-stats-chart" width="800" height="180" style="width:100%; height:180px; display:block;"></canvas>
            </div>
        </main>
    </div>

    <script type="module" src="js/app_debug.js?v=24"></script>
</body>

</html>
