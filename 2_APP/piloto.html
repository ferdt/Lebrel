<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Piloto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css?v=21">
    <style>
        .grid-dashboard {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        /* 1. Sugerencia de conducción */
        .card-instruction {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #val_instruccion {
            font-size: clamp(0.5rem, 7vw, 7rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* 2. Intervalo y Velocidad */
        .row-interval-speed {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
        }

        .card-interval,
        .card-speed {
            padding: 10px 10px;
            border-radius: 10px;
        }

        #val_diferencia_ideal {
            font-size: clamp(3rem, 12vw, 5rem);
        }

        #val_velocidad_actual {
            font-size: clamp(3rem, 12vw, 4rem);
            color: var(--text-primary);
        }

        /* 3. Odómetro */
        .card-odo-total {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(59, 130, 246, 0.05));
            border-color: rgba(59, 130, 246, 0.3);
            padding: 25px 15px;
            border-radius: 10px;
        }

        /* 4. Odómetro Parcial y Media Reset */
        .row-partial-reset {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .row-partial-reset .card {
            padding: 15px 10px;
            border-radius: 10px;
        }

        /* 5. Cambio de Media */
        .card-next-media {
            display: flex;
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center;
            padding: 20px 25px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
        }

        .media-info-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .media-info-group.right {
            align-items: flex-end;
        }

        .sub-value {
            font-size: clamp(1rem, 4vw, 1.8rem);
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .label-small {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }

        #btn-reset-parcial {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-red);
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        #btn-reset-parcial:active {
            background: rgba(239, 68, 68, 0.2);
            transform: scale(0.98);
        }

        @media (min-width: 769px) {
            .grid-dashboard {
                display: grid;
                grid-template-columns: 1fr 1fr;
                max-width: 800px;
                margin: 0 auto;
            }

            .card-instruction {
                grid-column: span 2;
            }

            .row-interval-speed {
                grid-column: span 2;
            }

            .card-odo-total {
                grid-column: span 2;
            }

            .row-partial-reset {
                grid-column: span 2;
            }

            .card-next-media {
                grid-column: span 2;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">
        <div id="header-container"></div>

        <main class="grid-dashboard">
            <div class="card card-instruction">
                <div id="val_instruccion">--</div>
            </div>

            <!-- PID Control Bar -->
            <div class="pid-container"
                style="background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 8px; height: 16px; position: relative; overflow: hidden; width: 100%; margin-top: -6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center;">
                <div id="pid-bar-center"
                    style="position: absolute; left: 50%; width: 2px; height: 100%; background: var(--text-secondary); opacity: 0.5; z-index: 2;">
                </div>
                <div id="pid-bar-left"
                    style="position: absolute; right: 50%; height: 100%; background: var(--accent-red); width: 0%; z-index: 1; transition: width 0.1s ease;">
                </div>
                <div id="pid-bar-right"
                    style="position: absolute; left: 50%; height: 100%; background: var(--accent-green); width: 0%; z-index: 1; transition: width 0.1s ease;">
                </div>
            </div>

            <!-- 2. Intervalo y velocidad -->
            <div class="row-interval-speed">
                <div class="card card-interval">
                    <div class="label-small">Intervalo</div>
                    <div id="val_diferencia_ideal" class="value positive">+0.0</div>
                </div>
                <div class="card card-speed">
                    <div class="label-small">Velocidad</div>
                    <div class="value"><span id="val_velocidad_actual">0.0</span> <span id="val_velocidad_objetivo"
                            style="color:var(--text-secondary); font-size:clamp(0.5rem, 4vmin, 2rem);">0.0</span>
                    </div>
                </div>
            </div>

            <!-- 3. Odómetro -->
            <div class="card card-odo-total">
                <div class="label-small">Odómetro Total</div>
                <div id="val_distancia" class="value" style="font-size: clamp(3.5rem, 12vw, 5rem);">0.000</div>
            </div>

            <!-- 4. Odómetro parcial y velocidad media desde reset -->
            <div class="row-partial-reset">
                <div class="card">
                    <div class="label-small">Media Reset</div>
                    <div id="val_media_reset" class="value" style="font-size: 2.2rem;">0.0</div>
                </div>
                <div class="card">
                    <div class="label-small">Parcial</div>
                    <div id="val_odo_parcial" class="value" style="font-size: 2.2rem;">0.000</div>
                </div>
            </div>

            <!-- 5. Cambio de media -->
            <div class="card card-next-media">
                <div class="media-info-group">
                    <div class="label-small">Próxima Media</div>
                    <div id="val_proxima_media" class="value" style="font-size: 2rem; color: var(--accent-blue);">0.0
                    </div>
                </div>
                <div class="media-info-group right">
                    <div class="label-small">Distancia Cambio</div>
                    <div id="val_distancia_cambio" class="value" style="font-size: 2rem;">--</div>
                </div>
            </div>

            <!-- Ayudas sonoras y Botón de Reset Odo Parcial -->
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="btn-sound-aids"
                    style="flex: 1; padding: 15px; font-size: 0.9rem; background: rgba(59, 130, 246, 0.1); border: 1px solid var(--accent-blue); color: var(--accent-blue); border-radius: 8px; cursor: pointer;">
                    AYUDA SONORA: <span id="val-sound-aids">ON</span>
                </button>
                <button id="btn-reset-parcial"
                    style="flex: 1; padding: 15px; font-size: 0.9rem; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); border-radius: 8px; cursor: pointer;">
                    RESET PARCIAL
                </button>
            </div>
        </main>
    </div>


    <!-- Cargar JS como module -->
    <script type="module" src="js/app_piloto.js?v=21"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=21').catch(err => console.log('SW Fail:', err));
            });
        }
    </script>
</body>

</html>
