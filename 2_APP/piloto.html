<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lebrel - Piloto</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .stage-info {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .grid-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 10px;
            width: 100%;
        }

        /* Modifiers for specific cards */
        .card-delta {
            grid-column: 1 / 2;
        }

        .card-odo {
            grid-column: 2 / 3;
        }

        .card-time {
            grid-column: 1 / 2;
        }

        .card-speed {
            grid-column: 2 / 3;
        }

        .card-media {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .sub-value {
            font-size: clamp(1rem, 4vmin, 1.5rem);
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .grid-dashboard {
                grid-template-columns: 1fr;
            }

            .card-delta,
            .card-odo,
            .card-time,
            .card-speed,
            .card-media {
                grid-column: 1 / -1;
            }

            .card-media {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <div class="glass-container">

        <header class="unified-header">
            <nav class="main-nav">
                <a href="#" onclick="window.navigateSPA('piloto.html'); return false;" class="nav-link active">Piloto</a>
                <a href="#" onclick="window.navigateSPA('copiloto.html'); return false;" class="nav-link">Copiloto</a>
                <a href="#" onclick="window.navigateSPA('botonera.html'); return false;" class="nav-link">Botonera</a>
                <a href="#" onclick="window.navigateSPA('config.html'); return false;" class="nav-link">Config</a>
                <a href="#" onclick="window.navigateSPA('tramos.html'); return false;" class="nav-link">Tramos</a>
                <a href="#" onclick="window.navigateSPA('test.html'); return false;" class="nav-link">Test</a>
            </nav>
            <div class="stage-info">
                <span id="val_tramo_nombre">TC-0: SIN TRAMO</span>
                <span class="separator">|</span>
                <span id="val_hora">00:00:00</span>
            </div>
            <div class="header-right" style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-fullscreen" class="icon-btn" title="Pantalla Completa">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
                <div id="status-indicator" class="status disconnected">OFFLINE</div>
            </div>
        </header>

        <main class="grid-dashboard">
            <!-- 1. Delta y Odómetro (Principal) -->
            <div class="card metric-large card-delta">
                <h3>Intervalo</h3>
                <div id="val_diferencia_ideal" class="value positive">+0.0</div>
            </div>

            <div class="card metric-large card-odo">
                <h3>Odómetro Total</h3>
                <div id="val_distancia" class="value">0.00 km</div>
            </div>

            <!-- 2. Tiempo Tramo y Velocidades -->
            <div class="card card-time">
                <h3>Tiempo Tramo</h3>
                <div id="val_tiempo_tramo" class="value">00:00:00.0</div>
            </div>

            <div class="card card-speed">
                <h3>Velocidad (Act / Obj)</h3>
                <div style="display:flex; align-items:baseline; gap:10px;">
                    <div id="val_velocidad_actual" class="value">0.0</div>
                    <div class="sub-value">/ <span id="val_velocidad_objetivo">0.0</span> km/h</div>
                </div>
            </div>

            <!-- 3. Próxima Media -->
            <div class="card card-media">
                <div>
                    <h3>Próximo Cambio de Media</h3>
                    <div style="display:flex; align-items:baseline; gap: 10px;">
                        <div id="val_proxima_media" class="value positive">0.0 km/h</div>
                    </div>
                </div>
                <div>
                    <h3>Distancia hasta cambio</h3>
                    <div id="val_distancia_cambio" class="value">-- km</div>
                </div>
            </div>

        </main>
    </div>

    <!-- Cargar JS como module -->
    <script type="module" src="js/app_piloto.js?v=2"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=2').catch(err => console.log('SW Fail:', err));
            });
        }
    </script>
</body>

</html>
